<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' file:; img-src 'self' file: data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'" />
    <title>Print Preview</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f3f3;
      }
      iframe {
        width: 100%;
        height: 100vh;
        border: 0;
      }
    </style>
  </head>
  <body>
    <iframe id="pdf-frame"></iframe>
    <script>
      const params = new URLSearchParams(window.location.search);
      const pdfUrl = params.get('pdf');
      const frame = document.getElementById('pdf-frame');
      if (pdfUrl) {
        frame.src = pdfUrl;
      }
    </script>
  </body>
</html>
